      <stop offset="0%" stop-color="#060912"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
